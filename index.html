<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page1">
        <div class="inputnames">
            <div class="inputname">
                <label for="name1">Player 1's name:</label>
                <input
                type="text"
                id="name1"
                name="name1"
                maxlength="15"
                size="15" />
            </div>
            <div class="inputname">
                <label for="name2">Player 2's name:</label>
                <input
                type="text"
                id="name2"
                name="name2"
                maxlength="15"
                size="15" />
            </div>
        </div>
        <button class="play">PLAY</button>
    </div>

    <div class="page2">
        <div class="gameinfo">Placeholder</div>
        <div class="game">
            <div class="cell cell1" data-index-number="0"></div>
            <div class="cell cell2" data-index-number="1"></div>
            <div class="cell cell3" data-index-number="2"></div>
            <div class="cell cell4" data-index-number="3"></div>
            <div class="cell cell5" data-index-number="4"></div>
            <div class="cell cell6" data-index-number="5"></div>
            <div class="cell cell7" data-index-number="6"></div>
            <div class="cell cell8" data-index-number="7"></div>
            <div class="cell cell9" data-index-number="8"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
